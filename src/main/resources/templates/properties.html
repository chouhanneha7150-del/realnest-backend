<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RealNest Properties</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">🏠 RealNest Properties</h1>

    <!-- 🔍 SEARCH BAR (ADD HERE 👇) -->
    <form action="/search" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" name="keyword" class="form-control" placeholder="Search by title or location...">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    <!-- ✅ ADD FORM -->
    <div class="card p-4 mb-4 shadow">
        <h4>Add Property</h4>
        <form action="/add-property" method="post">
            <div class="row">
                <div class="col">
                    <input type="text" name="title" class="form-control" placeholder="Title" required>
                </div>
                <div class="col">
                    <input type="text" name="location" class="form-control" placeholder="Location" required>
                </div>
                <div class="col">
                    <input type="number" name="price" class="form-control" placeholder="Price" required>
                </div>
                <div class="col">
                    <button class="btn btn-success w-100">Add</button>
                </div>
            </div>
        </form>
    </div>

    <!-- ✅ TABLE -->
    <div class="card shadow p-3">
        <h4>All Properties</h4>

        <table class="table table-striped mt-3">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Location</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${properties}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.title}"></td>
                <td th:text="${p.location}"></td>
                <td th:text="${p.price}"></td>
                <td>
                    <a th:href="@{'/edit/' + ${p.id}}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{'/delete/' + ${p.id}}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
